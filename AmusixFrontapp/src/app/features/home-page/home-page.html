<div class="w-100 h-100 d-flex justify-content-center align-items-center p-4 position-relative">
  <img alt="home page background" ngSrc="/images/home-page-bg.jpg" class="background-img" fill/>
  <a routerLink="/login" class="btn btn-sm btn-outline-primary position-absolute top-0 end-0 mt-3 me-3">
    <i class="bi bi-box-arrow-in-right"></i> Log in
  </a>
  <div class="d-flex flex-column align-items-center justify-content-around w-100 h-75 z-1" style="max-width: 750px">

    <div class="d-flex flex-column align-items-center">
      <h1 class="fw-bold mb-0" style="font-size: 5em">Amusix</h1>
      <div class="badge bg-primary">v{{ appVersion() }}</div>
    </div>

    <div class="fs-4 text-center">The most <b>simple</b> app to share <b>all</b> your favorite songs!</div>

    <div class="d-flex flex-column justify-content-center align-items-center">
      <ul class="nav nav-tabs justify-content-center column-gap-3 row-gap-2 mb-3 border-0" role="tablist">
        <li class="nav-item" role="presentation">
          <button class="btn btn-outline-primary active"
                  id="home-tab"
                  data-bs-toggle="tab"
                  data-bs-target="#tab1"
                  type="button"
                  role="tab"
                  aria-controls="tab1"
                  aria-selected="true">
            <i class="bi bi-search"></i> Search for songs
          </button>
        </li>
        <li class="nav-item" role="presentation">
          <button class="btn btn-outline-primary"
                  id="profile-tab"
                  data-bs-toggle="tab"
                  data-bs-target="#tab2"
                  type="button"
                  role="tab"
                  aria-controls="tab2"
                  aria-selected="false">
            <i class="bi bi-music-note-list"></i> Manage your song playlists
          </button>
        </li>
        <li class="nav-item" role="presentation">
          <button class="btn btn-outline-primary"
                  id="contact-tab"
                  data-bs-toggle="tab"
                  data-bs-target="#tab3"
                  type="button"
                  role="tab"
                  aria-controls="tab3"
                  aria-selected="false">
            <i class="bi bi-people-fill"></i> Share with your friends
          </button>
        </li>
      </ul>
      <div class="tab-content shadow rounded p-3 text-center">
        <div class="tab-pane active show" id="tab1" role="tabpanel" tabindex="0">
          Search for your favorite songs across the largest song library on the web.
        </div>
        <div class="tab-pane" id="tab2" role="tabpanel" tabindex="0">
          Create playlists and add your favorite songs.
        </div>
        <div class="tab-pane" id="tab3" role="tabpanel" tabindex="0">
          Add your friends and share your favorite songs and playlists with them.
        </div>
      </div>
    </div>

    <a routerLink="/register"
       class="register-button bg-primary text-white rounded px-4 py-2 cursor-pointer">Try <b>Amusix</b></a>

  </div>
</div>
