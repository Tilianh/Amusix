@if (isLoading()) {
  <app-loading class="mt-n5"/>
} @else {
  <div class="d-flex flex-column h-100">
    <div class="position-relative pb-1">
      <ng-container [ngTemplateOutlet]="headerTemplateRef()"
                    [ngTemplateOutletContext]="{pageItemCount: paginatedItems().items.length, totalItemCount: paginatedItems().totalItemCount}"/>
      <div class="fade-gradient position-absolute w-100 top-100 mt-n1 bottom-0 z-1"
           [class.pb-5]="showFadeInGradient()"></div>
    </div>
    @if (paginatedItems().items.length) {
      <div #itemContainer class="pb-4 pb-md-5 ps-4 ms-n4 pt-4 pe-4 me-n4 me-md-n5 overflow-auto"
           (scrollend)="onScrollEnd()"
           (scroll)="onScroll()">
        <div class="d-grid column-gap-5 row-gap-4 "
             [class.grid-display]="!isPhoneScreen()"
             [class.pe-4]="!isPhoneScreen()">
          @for (item of paginatedItems().items; track $index) {
            <div class="w-100 h-100 mt-1">
              <ng-container [ngTemplateOutlet]="itemTemplateRef()"
                            [ngTemplateOutletContext]="{item: item, index: $index}"/>
            </div>
          }
        </div>
        @if (!areAllItemsLoaded()) {
          <div (click)="loadMoreItems()"
               class="pt-4 d-flex justify-content-center gap-3 align-items-center cursor-pointer">
            @if (!isBigScreen()) {
              <div class="spinner-border text-primary"></div>
            } @else {
              <div class="text-primary text-decoration-underline">Load more</div>
            }
          </div>
        }
      </div>
    } @else {
      <div class="mt-3 text-muted">
      @if (noItemText()) {
        {{ noItemText() }}
      } @else {
        Nothing to show
      }
      </div>
    }
  </div>
}
