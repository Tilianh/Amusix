@if (isLoading()) {
  <div class="d-flex justify-content-center align-items-center w-100 h-100 p-3">
    <div class="d-flex flex-column align-items-center gap-3">
      <div class="spinner-border text-primary" style="width: 3rem; height: 3rem"></div>
      @if (loadingText()) {
        <div>{{ loadingText() }}</div>
      }
    </div>
  </div>
}
